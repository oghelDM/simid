<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/png" href="/star.png" />
		<title>Simid Preview</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			body {
				font-family:
					system-ui,
					-apple-system,
					sans-serif;
				background: #bbbbbb;
				color: #fff;
			}
			.header {
				padding: 1rem 2rem;
				background: #2a2a2a;
				border-bottom: 1px solid #3a3a3a;
			}
			.header h1 {
				font-size: 1.2rem;
				font-weight: 500;
			}
			.creative-info {
				font-size: 0.9rem;
				color: #888;
				margin-top: 0.5rem;
			}
			#container {
				position: relative;
				width: 100%;
				height: auto;
				aspect-ratio: 16 / 9;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: calc(100vh - 80px);
				padding: 2rem;
			}
			#creativeContainer {
				position: relative;
				width: 100%;
				height: auto;
				aspect-ratio: 16 / 9;
				outline: 2px solid #3a3a3a;
				background-color: rgba(255, 0, 0, 0.4);
			}
			iframe {
				position: absolute;
				width: 100%;
				height: auto;
				aspect-ratio: 16 / 9;
				padding: unset;
				margin: unset;
				border: none;
			}
			video {
				position: absolute;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<h1>Simid Creative Framework - Preview</h1>
		</div>
		<div id="container">
			<div id="creativeContainer">
				<video muted id="videoId">
					<source src="" type="video/mp4" />
				</video>

				<iframe
					id="creativeFrame"
					src="creative.html"
					title="Creative Preview"
				>
				</iframe>

				<div
					id="video-controls"
					style="
						position: absolute;
						bottom: 0;
						width: 100%;
						height: 60px;
						color: white;
						pointer-events: none;
						z-index: 99;
					"
				>
					<div
						id="progress-bar"
						style="
							position: absolute;
							bottom: 0;
							width: 100%;
							height: 8px;
							background-color: gray;
						"
					>
						<div
							id="progress-bar-id"
							style="
								position: absolute;
								width: 0%;
								height: 100%;
								background-color: orange;
							"
						></div>
					</div>
					<div
						style="
							display: flex;
							justify-content: space-between;
							padding: 0 10px;
							align-items: center;
							height: 52px;
							font-size: 40px;
							user-select: none;
							cursor: pointer;
						"
					>
						<div style="display: flex; gap: 4px">
							<div
								id="playBtn-id"
								style="
									width: 40px;
									height: 40px;
									/* background-color: chartreuse; */
									text-align: center;
									line-height: 40px;
									pointer-events: auto;
								"
							>
								⏸️
							</div>
							<div
								id="remainingTime-id"
								style="
									width: 40px;
									height: 40px;
									text-align: center;
									line-height: 40px;
									font-size: 16px;
									font-family: sans-serif;
								"
							>
								0:00
							</div>
						</div>
						<div style="display: flex; gap: 4px">
							<div
								id="muteBtn-id"
								style="
									width: 40px;
									height: 40px;
									text-align: center;
									line-height: 40px;
									pointer-events: auto;
								"
							>
								🔇
							</div>
							<div
								id="fullscreenBtn-id"
								style="
									width: 40px;
									height: 40px;
									text-align: center;
									line-height: 40px;
									pointer-events: auto;
								"
							>
								❇️
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			const video = document.getElementById("videoId");
			const container = document.getElementById("container");
			const iframe = document.getElementById("creativeFrame");
			iframe.onload = (a) => {
				// Access iframe's window directly (same origin only)
				const assetsPrefixUrl = iframe.contentWindow.assetsPrefixUrl;
				console.log("Creative a:", a.target);
				console.log("Creative assetsPrefixUrl:", assetsPrefixUrl);
				video.src = `${assetsPrefixUrl}video_mid.mp4`;
				video.play();
			};

			// video controls
			const playBtn = document.getElementById("playBtn-id");
			const muteBtn = document.getElementById("muteBtn-id");
			const fullscreenBtn = document.getElementById("fullscreenBtn-id");
			const remainingTimeElt =
				document.getElementById("remainingTime-id");
			const progressBar = document.getElementById("progress-bar-id");

			playBtn.innerHTML = "⏸️";
			muteBtn.innerHTML = "🔇";
			fullscreenBtn.innerHTML = "❇️";

			const toggleVideo = (play) => {
				playBtn.innerHTML = play ? "⏸️" : "▶️";
				if (play) {
					video.play();
				} else {
					video.pause();
				}
			};
			const toggleFullScreen = (fulllScreen) => {
				console.log("toggleFullScreen: ", fulllScreen);
				fullscreenBtn.innerHTML = fulllScreen ? "❎" : "❇️";
				if (fulllScreen && !document.fullscreenElement) {
					container.requestFullscreen();
				} else if (
					!fulllScreen &&
					document.exitFullscreen &&
					document.fullscreenElement
				) {
					document.exitFullscreen();
				}
			};
			const toggleMute = (mute) => {
				console.log("toggleMute: ", mute);
				muteBtn.innerHTML = mute ? "🔇" : "🔈";
				video.muted = mute;
			};

			// video controls, message towards creative
			playBtn.addEventListener("click", (e) => {
				e.preventDefault();
				e.stopPropagation();
				const isPlaying = playBtn.innerHTML === "⏸️";
				toggleVideo(!isPlaying);
				const message = {
					sessionId,
					type: isPlaying ? "SIMID:Media:pause" : "SIMID:Media:play",
					timestamp: Date.now(),
				};
				iframe.contentWindow.postMessage(JSON.stringify(message), "*");
			});
			fullscreenBtn.addEventListener("click", (e) => {
				e.preventDefault();
				e.stopPropagation();
				const isFullScreen = fullscreenBtn.innerHTML === "❎";
				toggleFullScreen(!isFullScreen);
				// no notification to the creative
			});
			muteBtn.addEventListener("click", (e) => {
				e.preventDefault();
				e.stopPropagation();
				const isMuted = muteBtn.innerHTML === "🔇";
				toggleMute(!isMuted);
				const message = {
					sessionId,
					type: "SIMID:Media:volumechange",
					timestamp: Date.now(),
					args: { volume: isMuted ? 1 : 0 },
				};
				iframe.contentWindow.postMessage(JSON.stringify(message), "*");
			});

			let sessionId;
			// from creative towards video controls
			window.addEventListener("message", (event) => {
				const data = JSON.parse(event.data);
				switch (data.type) {
					case "createSession":
						sessionId = data.sessionId;
						break;
					case "SIMID:Creative:requestPause":
						toggleVideo(false);
						break;
					case "SIMID:Creative:requestPlay":
						toggleVideo(true);
						break;
					case "SIMID:Creative:requestFullScreen":
						toggleFullScreen(true);
						break;
					case "SIMID:Creative:requestExitFullScreen":
						toggleFullScreen(false);
						break;
					case "SIMID:Creative:requestChangeVolume":
						toggleMute(data.args.volume === 0);
						break;
				}
			});

			/////////// progress bar ////////////
			video.addEventListener("timeupdate", () => {
				const duration = video.duration;
				const currentTime = video.currentTime;
				const message = {
					sessionId,
					type: "SIMID:Media:timeupdate",
					timestamp: Date.now(),
					args: { currentTime },
				};
				iframe.contentWindow.postMessage(JSON.stringify(message), "*");
				if (duration === undefined || currentTime === undefined) {
					return;
				}
				const remainingTime = duration - currentTime;
				if (remainingTime <= 0) {
					window.clearInterval(intervalId);
				}
				progressBar.style.width = `${(currentTime / duration) * 100}%`;
				const nbMinutes = Math.floor(remainingTime / 60);
				const nbSeconds = Math.round(remainingTime % 60);
				remainingTimeElt.innerHTML = `${nbMinutes}:${nbSeconds
					.toString()
					.padStart(2, "0")}`;
			});
		</script>
	</body>
</html>
